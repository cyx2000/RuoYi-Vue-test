// 编译脚本
buildscript {
    ext {
        springBootVersion = "4.0.3" // Spring Boot Bom版本定义
        springFrameworkVersion = "7.0.5" // Spring Framework Bom版本定义
        druidDBPool = "1.2.28"
        mybatis = "4.0.1"
        fastJson2 = "2.0.61"
        jacksonAnnotations = "2.21"
        oshi = "6.10.0"
        pagehelper = "2.1.1"
        commonsIO = "2.21.0"
        servletApi = "6.1.0"
        jaxbApi = "2.3.1"
        yauaa = "8.1.0"
        commonsLang3 = "3.19.0"
        commonsPool2 = "2.12.1"
        poiooxml = "4.1.2"
        velocityEngine = "2.3"
        springdoc = "3.0.2"
        kaptcha = "2.3.3"
    }
    // 仓库配置
    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://maven.aliyun.com/repository/spring' }
        maven { url = 'https://maven.aliyun.com/repository/google' }
        mavenCentral()
        gradlePluginPortal()
    }

    dependencies {
        classpath("io.spring.dependency-management:io.spring.dependency-management.gradle.plugin:1.1.7")
        classpath("org.springframework.boot:org.springframework.boot.gradle.plugin:${springBootVersion}")
    }
}

version = '1.0.0-SNAPSHOT'

// 项目配置
allprojects {
    group = 'com.ruoyi'

    // 仓库配置
    repositories {
        mavenLocal()
        maven { url = 'https://maven.aliyun.com/repository/central' }
        maven { url = 'https://maven.aliyun.com/repository/spring' }
        maven { url = 'https://maven.aliyun.com/repository/google' }
        mavenCentral()
    }
}
subprojects {

    apply plugin: 'java-library'
    apply plugin: 'io.spring.dependency-management'

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.springframework:spring-framework-bom:${springFrameworkVersion}"
        }
        dependencies {
            dependency "com.alibaba:druid-spring-boot-4-starter:${druidDBPool}"
            dependency "org.mybatis.spring.boot:mybatis-spring-boot-starter:${mybatis}"
            dependency "com.alibaba.fastjson2:fastjson2:${fastJson2}"
            dependency "com.fasterxml.jackson.core:jackson-annotations:${jacksonAnnotations}"
            dependency "com.github.oshi:oshi-core:${oshi}"
            dependency "com.github.pagehelper:pagehelper-spring-boot-starter:${pagehelper}"
            dependency "commons-io:commons-io:${commonsIO}"
            dependency "jakarta.servlet:jakarta.servlet-api:${servletApi}"
            dependency "javax.xml.bind:jaxb-api:${jaxbApi}"
            dependency "nl.basjes.parse.useragent:yauaa:${yauaa}"
            dependency "org.apache.commons:commons-lang3:${commonsLang3}"
            dependency "org.apache.commons:commons-pool2:${commonsPool2}"
            dependency "org.apache.poi:poi-ooxml:${poiooxml}"
            dependency "org.apache.velocity:velocity-engine-core:${velocityEngine}"
            dependency "org.springdoc:springdoc-openapi-starter-webmvc-ui:${springdoc}"
            dependency "pro.fessional:kaptcha:${kaptcha}"
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.release = 17
        options.encoding = 'UTF-8'
        options.warnings = false
        options.deprecation = true
        options.compilerArgs += ["-parameters", "-Xlint:unchecked", "-Xlint:-serial"]
    }

    tasks.withType(GenerateModuleMetadata).configureEach {
        enabled = false
    }

}


/*
 * This file was generated by the Gradle 'init' task.
 */


apply plugin: "org.springframework.boot"
apply plugin: 'java'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

dependencies {
    implementation project(':ruoyi-framework')
    implementation project(':ruoyi-quartz')
    implementation project(':ruoyi-generator')

    implementation project(':modules:wwune-i18n')

    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui' // spring-doc
    runtimeOnly 'com.mysql:mysql-connector-j' // Mysql驱动包

    developmentOnly 'org.springframework.boot:spring-boot-devtools'
}

description = 'ruoyi-admin'

apply plugin: "org.springframework.boot"
apply plugin: 'java'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}


dependencies {
    api libs.org.springframework.boot.spring.boot.devtools
    api libs.org.springdoc.springdoc.openapi.starter.webmvc.ui
    api libs.com.mysql.mysql.connector.j
    api libs.org.springframework.boot.spring.boot.starter.jdbc
    api project(':ruoyi-framework')
    api project(':ruoyi-quartz')
    api project(':ruoyi-generator')
}

description = 'ruoyi-admin'
